<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Atma:wght@400&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Atma',cursive;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#1e1e3f,#0a0a1f 70%);
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
transition:1s;
}

/* ---------------- LOADER ---------------- */

#loader{
position:fixed;
inset:0;
background:#0a0a1f;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
transition:opacity 1s;
}

.loader-heart{
font-size:70px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* ---------------- MAIN CONTENT ---------------- */

#mainContent{
display:none;
flex-direction:column;
align-items:center;
gap:25px;
}

.image-box{
width:260px;
height:320px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,77,136,0.6);
display:none;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

.subtitle{
font-size:clamp(22px,4.5vw,36px);
line-height:1.6;
max-width:90%;
opacity:0;
transition:opacity 0.8s ease;
}

#questionBox{
display:none;
flex-direction:column;
gap:25px;
align-items:center;
opacity:0;
transition:opacity 0.8s;
}

.buttons{
display:flex;
gap:60px;
position:relative;
}

button{
padding:14px 40px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
}

.yes{
background:#ff4d88;
color:white;
box-shadow:0 0 15px #ff4d88;
}

.no{
background:#444;
color:white;
position:absolute;
transition:all 0.5s ease;
}

#nextBtn{
display:none;
margin-top:20px;
background:#ff4d88;
color:white;
}

/* ---------------- BEACH VALENTINE PAGE ---------------- */

#beachPage{
display:none;
position:fixed;
inset:0;
background:linear-gradient(to top, rgba(255,140,0,0.5), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
animation:fadeIn 1.5s ease;
}

.valentine-title{
font-size:clamp(28px,6vw,50px);
margin-bottom:30px;
text-shadow:0 0 15px rgba(255,200,150,0.8);
}

.bouquet{
position:relative;
width:320px;
height:420px;
display:flex;
justify-content:center;
align-items:center;
}

.photo{
position:absolute;
width:180px;
height:240px;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.5);
background:white;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo:nth-child(1){
left:-100px;
top:60px;
transform:rotate(-15deg);
}

.photo:nth-child(2){
top:0;
z-index:2;
}

.photo:nth-child(3){
right:-100px;
top:60px;
transform:rotate(15deg);
}

.flowers{
position:absolute;
bottom:-40px;
font-size:45px;
}

@keyframes floatPetal{
from{transform:translateY(100vh) rotate(0deg);}
to{transform:translateY(-10vh) rotate(360deg);}
}

.petal{
position:absolute;
font-size:20px;
animation:floatPetal 10s linear infinite;
opacity:0.7;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div id="loader">
<div class="loader-heart">💖</div>
<p>Preparing something magical...</p>
</div>

<div id="mainContent">

<button id="startBtn">Tap to Start 💖</button>

<div class="image-box" id="imageBox">
<img id="slideImg" src="">
</div>

<div class="subtitle" id="subtitle"></div>

<div id="questionBox">
<div style="font-size:clamp(24px,5vw,38px);">
ওরে আমার সোনা মনি বল না, "ভালোবাসি" 🌝
</div>

<div class="buttons">
<button class="yes" onclick="yesClicked()">হ্যাঁ</button>
<button class="no" id="noBtn">না</button>
</div>

<button id="nextBtn">Next ❤️</button>
</div>

</div>

<div id="beachPage">
<div class="valentine-title">Happy Valentine's Day 💖</div>

<div class="bouquet">
<div class="photo"><img src="image1.jpg"></div>
<div class="photo"><img src="image2.jpg"></div>
<div class="photo"><img src="image3.jpg"></div>

<div class="flowers">🌹🌻🌹🌸🌹🌻🌹</div>
</div>
</div>

<audio id="song" src="song.mp3"></audio>
<audio id="song2" src="song2.mp3"></audio>

<script>

/* LOADER */

window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.opacity="0";
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("mainContent").style.display="flex";
},1000);
},1500);
};

const audio=document.getElementById("song");
const subtitle=document.getElementById("subtitle");
const imageBox=document.getElementById("imageBox");
const slideImg=document.getElementById("slideImg");
const questionBox=document.getElementById("questionBox");
const noBtn=document.getElementById("noBtn");
const nextBtn=document.getElementById("nextBtn");
const beachPage=document.getElementById("beachPage");
const song2=document.getElementById("song2");

const images=["image1.jpg","image2.jpg","image3.jpg"];
let imgIndex=0;

document.getElementById("startBtn").onclick=function(){
this.style.display="none";
imageBox.style.display="block";
audio.play();
};

/* SUBTITLES */

const subtitles=[
{start:0.9,end:20,text:`বাঁকা ঠোঁটের মুচকি হাসি<br>কুন্ডলীতে ম্যাচিং রাশি<br>তাইতো আমি তোরই কাছে<br>বারে বারে আসি।`},
{start:21,end:30,text:`মাইরি বলছি,<br>বাঁকা ঠোটের মুচকি হাসি<br>কুন্ডলীতে ম্যাচিং রাশি<br>তাইতো আমি তোরই কাছে বারে বারে আসি।`},
{start:31,end:42,text:`যখনই হয় মন উদাসী<br>গেয়ে উঠি ভীম পলাশী।<br>ঘুটঘুটে এই প্রেমপুরিতে জ্বালিয়ে দে না বাতি।`},
{start:43,end:51,text:`মিথ্যে হলে বলেই দে না, "তোকে ভালোবাসি"<br>ওরে আমার সোনা মনি বল না, "ভালোবাসি"`},
{start:51,end:61,text:`মুচকি হেসে বলেই দে না, "তোকে ভালোবাসি"<br>ওরে আমার মন্টু সোনা বল না, "ভালোবাসি"`}
];

let current=-1;

audio.addEventListener("timeupdate",()=>{
let t=audio.currentTime;
let i=subtitles.findIndex(s=>t>=s.start&&t<=s.end);

if(i!==current){
subtitle.style.opacity=0;
setTimeout(()=>{
if(i!==-1){
subtitle.innerHTML=subtitles[i].text;
subtitle.style.opacity=1;
slideImg.src=images[imgIndex];
imgIndex=(imgIndex+1)%images.length;
}
},300);
current=i;
}

if(t>61&&!audio.paused){
audio.pause();
subtitle.style.opacity=0;
questionBox.style.display="flex";
setTimeout(()=>questionBox.style.opacity=1,200);
}
});

/* NO BUTTON */

noBtn.addEventListener("mouseenter",()=>{
let x=Math.random()*(window.innerWidth-150);
let y=Math.random()*(window.innerHeight-150);
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

/* YES */

function yesClicked(){
nextBtn.style.display="inline-block";
}

/* NEXT */

nextBtn.onclick=function(){
document.getElementById("mainContent").style.display="none";
beachPage.style.display="flex";
song2.play();
};

/* FLOATING PETALS */

setInterval(()=>{
let petal=document.createElement("div");
petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(petal);
setTimeout(()=>petal.remove(),10000);
},800);

</script>

</body>
</html>
