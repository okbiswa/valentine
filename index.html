<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Atma:wght@400&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Atma',cursive;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#1e1e3f,#0a0a1f 70%);
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
transition:1s;
}

/* ---------- LOADER ---------- */

#loader{
position:fixed;
inset:0;
background:#0a0a1f;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
transition:opacity 1s;
}

.loader-heart{
font-size:70px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* ---------- MAIN CONTENT ---------- */

#mainContent{
display:none;
flex-direction:column;
align-items:center;
gap:25px;
}

/* IMAGE */

.image-box{
width:260px;
height:320px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,77,136,0.6);
display:none;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* SUBTITLE */

.subtitle{
font-size:clamp(22px,4.5vw,36px);
font-weight:normal;
line-height:1.6;
max-width:90%;
opacity:0;
transition:opacity 0.8s ease;
}

/* QUESTION */

#questionBox{
display:none;
flex-direction:column;
gap:25px;
align-items:center;
opacity:0;
transition:opacity 0.8s;
}

.buttons{
display:flex;
gap:60px;
position:relative;
}

button{
padding:14px 40px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
}

.yes{
background:#ff4d88;
color:white;
box-shadow:0 0 15px #ff4d88;
}

.no{
background:#444;
color:white;
position:absolute;
transition:all 0.5s ease;
}

#nextBtn{
display:none;
margin-top:20px;
background:#ff4d88;
color:white;
}

/* ---------- BEACH PAGE ---------- */

#beachPage{
display:none;
position:fixed;
inset:0;
background:
linear-gradient(to top, rgba(255,120,0,0.4), rgba(0,0,0,0.5)),
url("bg.jpg") center/cover no-repeat;

}

.overlay{
background:rgba(0,0,0,0.45);
height:100%;
overflow:auto;
padding:40px 20px;
}

.collage{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.collage img{
width:100%;
border-radius:20px;
padding:8px;
background:white;
box-shadow:0 10px 20px rgba(0,0,0,0.5);
transition:transform 0.4s;
}

.collage img:hover{
transform:scale(1.05);
}

#startBtn{
padding:14px 35px;
font-size:20px;
background:#ff4d88;
color:white;
border:none;
border-radius:40px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="loader">
<div class="loader-heart">💖</div>
<p>Preparing something magical...</p>
</div>

<div id="mainContent">

<button id="startBtn">Tap to Start 💖</button>

<div class="image-box" id="imageBox">
<img id="slideImg" src="image1.jpg">
</div>

<div class="subtitle" id="subtitle"></div>

<div id="questionBox">
<div style="font-size:clamp(24px,5vw,38px);">
ওরে আমার সোনা মনি বল না, "ভালোবাসি" 🌝
</div>

<div class="buttons">
<button class="yes" onclick="yesClicked()">হ্যাঁ</button>
<button class="no" id="noBtn">না</button>
</div>

<button id="nextBtn">Next ❤️</button>
</div>

</div>

<div id="beachPage">
<div class="overlay">
<h1 style="margin-bottom:30px;">Our Beautiful Memories 💕</h1>
<div class="collage">
<img src="image1.jpg">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">
<img src="image5.jpg">
</div>
</div>
</div>

<audio id="song" src="song.mp3"></audio>
<audio id="song2" src="song2.mp3"></audio>

<script>

/* ---------- LOADER ---------- */

window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.opacity="0";
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("mainContent").style.display="flex";
},1000);
},1500);
};

const audio=document.getElementById("song");
const subtitle=document.getElementById("subtitle");
const imageBox=document.getElementById("imageBox");
const slideImg=document.getElementById("slideImg");
const questionBox=document.getElementById("questionBox");
const noBtn=document.getElementById("noBtn");
const nextBtn=document.getElementById("nextBtn");
const beachPage=document.getElementById("beachPage");
const song2=document.getElementById("song2");

const images=["image1.jpg","image2.jpg","image3.jpg","image4.jpg","image5.jpg"];
let imgIndex=0;

document.getElementById("startBtn").onclick=function(){
this.style.display="none";
imageBox.style.display="block";
audio.play();
};

/* ---------- SUBTITLES WITH YOUR EXACT TIMESTAMPS ---------- */

const subtitles = [
{
start:9,end:20,
text:`বাঁকা ঠোঁটের মুচকি হাসি 🌝<br>
কুন্ডলীতে ম্যাচিং রাশি<br>
তাইতো আমি তোরই কাছে<br>
বারে বারে আসি। 😊`
},
{
start:21,end:30,
text:`মাইরি বলছি,<br>
বাঁকা ঠোটের মুচকি হাসি 🌝<br>
কুন্ডলীতে ম্যাচিং রাশি<br>
তাইতো আমি তোরই<br>
কাছে বারে বারে আসি। 😊`
},
{
start:31,end:42,
text:`যখনই হয় মন উদাসী 😞<br>
গেয়ে উঠি ভীম পলাশী।<br>
ঘুটঘুটে এই প্রেমপুরিতে<br>
জ্বালিয়ে দে না বাতি।🕯️`
},
{
start:43,end:51,
text:`মিথ্যে হলে বলেই দে না,<br>"তোকে ভালোবাসি"<br>
ওরে আমার সোনা মনি বল না,<br>"ভালোবাসি"`
},
{
start:51,end:61,
text:`মুচকি হেসে বলেই দে না,<br>"তোকে ভালোবাসি"<br>
ওরে আমার মন্টু সোনা বল না,<br>"ভালোবাসি"`
}
];

let currentSubtitle=-1;

audio.addEventListener("timeupdate",()=>{
let t=audio.currentTime;

let index=subtitles.findIndex(s=>t>=s.start&&t<=s.end);

if(index!==currentSubtitle){
subtitle.style.opacity=0;
setTimeout(()=>{
if(index!==-1){
subtitle.innerHTML=subtitles[index].text;
subtitle.style.opacity=1;
showImage();
}
},300);
currentSubtitle=index;
}

if(t>61 && !audio.paused){
fadeOutSong();
}
});

function showImage(){
slideImg.src=images[imgIndex];
imgIndex=(imgIndex+1)%images.length;
}

/* Smooth fade out */

function fadeOutSong(){
let fade=setInterval(()=>{
if(audio.volume>0.05){
audio.volume-=0.05;
}else{
clearInterval(fade);
audio.pause();
subtitle.style.opacity=0;
showQuestion();
}
},100);
}

/* Question */

function showQuestion(){
questionBox.style.display="flex";
setTimeout(()=>{questionBox.style.opacity=1;},100);
}

/* No button animation */

noBtn.addEventListener("mouseenter",()=>{
let x=Math.random()*(window.innerWidth-150);
let y=Math.random()*(window.innerHeight-150);
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

/* Yes */

function yesClicked(){
nextBtn.style.display="inline-block";
}

/* Next page */

nextBtn.onclick=function(){
document.getElementById("mainContent").style.display="none";
beachPage.style.display="block";
song2.play();
};

</script>

</body>
</html>
