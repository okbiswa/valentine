<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Atma:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Atma',cursive;}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#1e1e3f,#0a0a1f 70%);
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
transition:background 1.5s ease;
}

/* ---------------- LOADER ---------------- */

#loader{
position:fixed;
inset:0;
background:radial-gradient(circle at top,#1e1e3f,#0a0a1f 70%);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:opacity 1s ease;
}

.loader-heart{
font-size:70px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

#loader p{
margin-top:20px;
font-size:20px;
}

/* ---------------- SUBTITLE ---------------- */

.subtitle{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:clamp(32px,7vw,65px);
font-weight:bold;
max-width:90%;
opacity:0;
transition:opacity 0.8s ease;
text-shadow:0 0 20px #ff4d88;
}

/* ---------------- SLIDESHOW ---------------- */

.image-slide{
position:absolute;
bottom:5%;
width:260px;
height:320px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,77,136,0.7);
display:none;
animation:fadeIn 1s ease;
}

.image-slide img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* ---------------- QUESTION ---------------- */

.question-box{
display:none;
flex-direction:column;
gap:30px;
align-items:center;
}

.buttons{
display:flex;
gap:80px;
margin-top:20px;
position:relative;
}

button{
padding:15px 45px;
font-size:22px;
border:none;
border-radius:40px;
cursor:pointer;
transition:0.4s;
}

.yes{
background:#ff4d88;
color:white;
box-shadow:0 0 20px #ff4d88;
}

.yes:hover{transform:scale(1.1);}

.no{
background:#444;
color:white;
position:relative;
}

/* ---------------- NEXT BUTTON ---------------- */

.next-btn{
display:none;
margin-top:40px;
background:#ff4d88;
color:white;
}

/* ---------------- COLLAGE PAGE ---------------- */

#collagePage{
display:none;
position:fixed;
inset:0;
overflow:auto;
padding:40px 20px;
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
}

.collage-overlay{
background:rgba(0,0,0,0.45);
min-height:100vh;
padding:40px 20px;
}

.collage-title{
font-size:clamp(28px,5vw,45px);
margin-bottom:30px;
}

.collage-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.collage-grid img{
width:100%;
border-radius:20px;
padding:10px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:transform 0.4s;
}

.collage-grid img:hover{
transform:scale(1.05);
}

/* ---------------- FLOATING HEARTS ---------------- */

.heart-bg{
position:absolute;
color:#ff4d88;
animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh);opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}

#startBtn{
display:none;
padding:15px 35px;
font-size:22px;
background:#ff4d88;
color:white;
border:none;
border-radius:40px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="loader">
<div class="loader-heart">💖</div>
<p>Preparing something magical...</p>
</div>

<button id="startBtn">Tap to Start 💖</button>

<audio id="song" src="song.mp3"></audio>
<audio id="song2" src="song2.mp3"></audio>

<div class="subtitle" id="subtitle"></div>

<div class="image-slide" id="imageBox">
<img id="slideImg" src="">
</div>

<div class="question-box" id="questionBox">
<div style="font-size:clamp(30px,6vw,55px);">
ওরে আমার সোনা মনি বল না, "ভালোবাসি" 🌝
</div>
<div class="buttons">
<button class="yes" onclick="yesClicked()">হ্যাঁ</button>
<button class="no" id="noBtn">না</button>
</div>
<button class="next-btn" id="nextBtn">Next ❤️</button>
</div>

<div id="collagePage">
<div class="collage-overlay">
<h1 class="collage-title">Our Beautiful Memories 💕</h1>
<div class="collage-grid">
<img src="image1.jpg">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">
<img src="image5.jpg">
</div>
</div>
</div>

<script>

/* ---------- LOADER ---------- */

const loader=document.getElementById("loader");
window.onload=()=>{
setTimeout(()=>{
loader.style.opacity="0";
setTimeout(()=>{
loader.style.display="none";
document.getElementById("startBtn").style.display="block";
},1000);
},1500);
};

/* ---------- MAIN LOGIC ---------- */

const startBtn=document.getElementById("startBtn");
const audio=document.getElementById("song");
const subtitle=document.getElementById("subtitle");
const questionBox=document.getElementById("questionBox");
const noBtn=document.getElementById("noBtn");
const imageBox=document.getElementById("imageBox");
const slideImg=document.getElementById("slideImg");
const nextBtn=document.getElementById("nextBtn");
const collagePage=document.getElementById("collagePage");
const song2=document.getElementById("song2");

const images=["image1.jpg","image2.jpg","image3.jpg","image4.jpg","image5.jpg"];
let imgIndex=0;

startBtn.onclick=function(){
startBtn.style.display="none";
audio.play();
};

/* Subtitle timing (adjust slightly if needed) */

audio.addEventListener("timeupdate",()=>{
let t=audio.currentTime;

if(t>=5 && t<15){
show("বাঁকা ঠোঁটের মুচকি হাসি...");
showImage();
}
else if(t>=15 && t<25){
show("মাইরি বলছি...");
}
else if(t>=25 && t<38){
show("যখনই হয় মন উদাসী...");
}
else if(t>=38 && t<55){
show('মিথ্যে হলে বলেই দে না, "তোকে ভালোবাসি"');
}
else if(t>=55){
subtitle.style.opacity=0;
questionBox.style.display="flex";
audio.pause();
}
});

function show(text){
subtitle.innerHTML=text;
subtitle.style.opacity=1;
}

function showImage(){
imageBox.style.display="block";
slideImg.src=images[imgIndex];
imgIndex=(imgIndex+1)%images.length;
}

/* YES */

function yesClicked(){
nextBtn.style.display="inline-block";
}

/* NO button impossible to catch */

noBtn.addEventListener("mouseenter",()=>{
let x=Math.random()*(window.innerWidth-200);
let y=Math.random()*(window.innerHeight-200);
noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

/* NEXT → BEACH PAGE */

nextBtn.onclick=function(){
document.body.style.background="none";
collagePage.style.display="block";
song2.play();
};

/* Floating hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart-bg";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*30)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
},700);

</script>

</body>
</html>
